<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翟士源 - 个人简历与交互作品集</title>
    <meta name="description" content="翟士源的个人网站 - 软件工程 / AI赋能 / 交互作品集">
    <style>
        :root {
            --bg-color: transparent; 
            /* 优化4：底层卡片极低透明度，凸显Z轴景深 */
            --surface-color: rgba(18, 18, 30, 0.2); 
            --surface-modal: rgba(18, 18, 30, 0.7); 
            
            --text-main: #ffffff;
            --text-secondary: #e2e8f0;
            --text-muted: #94a3b8;
            --primary-color: #818cf8;
            --primary-light: rgba(99, 102, 241, 0.2);
            --primary-hover: #6366f1;
            
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --glass-border-heavy: 1px solid rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            --glass-shadow-heavy: 0 25px 50px -12px rgba(0,0,0,0.6);
            --glass-inset: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            
            /* 优化6：引入果冻物理弹簧曲线 */
            --spring-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-fast: 150ms var(--spring-easing);
            --transition-normal: 400ms var(--spring-easing);
            
            --radius-md: 0.75rem;
            --radius-lg: 1.25rem;
            --font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            /* 优化3：引入理性的等宽字体栈 */
            --font-mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Monaco, Consolas, monospace;
        }

        *:focus-visible { outline: 2px solid var(--primary-color); outline-offset: 3px; border-radius: 4px; }
        @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; } }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html { scroll-behavior: smooth; scroll-padding-top: 100px; }
        body { 
            font-family: var(--font-family); background-color: #05050A; color: var(--text-main); 
            line-height: 1.6; -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
        }
        body.locked { overflow: hidden; height: 100vh; }

        /* 优化3：强制等宽字体类 */
        .font-mono { font-family: var(--font-mono); font-weight: 600; letter-spacing: 0.02em; }

        /* ================= 进场动画特效 ================= */
        .splash-screen {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(5,5,10,0.9) 100%);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .splash-screen.hidden { opacity: 0; transform: scale(1.1); pointer-events: none; }
        .splash-content { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .sys-text-container { display: flex; align-items: center; margin-bottom: 1.5rem; height: 20px;}
        .sys-text { font-family: var(--font-mono); color: #10b981; letter-spacing: 0.2em; font-size: 0.85rem; text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        
        /* 优化9：真实的终端光标逻辑，去掉无限 blinking，由 JS 控制 */
        .typing-cursor { display: inline-block; width: 8px; height: 1.2em; background: #10b981; margin-left: 4px; opacity: 1; }
        .typing-cursor.blinking { animation: blink 1s step-end infinite; }
        
        .splash-title { font-size: 5rem; font-weight: 900; color: #fff; margin-bottom: 0.5rem; letter-spacing: -0.04em; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .splash-subtitle { font-family: var(--font-mono); color: #B19EEF; letter-spacing: 0.4em; font-size: 0.9rem; margin-bottom: 3.5rem; text-shadow: 0 0 15px rgba(177, 158, 239, 0.5); }

        .enter-btn {
            background: rgba(10, 10, 15, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); color: #fff;
            padding: 1.2rem 3.5rem; font-size: 1rem; font-weight: 700; letter-spacing: 0.3em;
            cursor: pointer; position: relative; overflow: hidden; border-radius: 99px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 0 0 rgba(129, 140, 248, 0);
            transition: all 0.4s var(--spring-easing);
        }
        .enter-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 159, 252, 0.4), transparent);
            transition: left 0.6s ease;
        }
        .enter-btn:hover { border-color: #FF9FFC; color: #FF9FFC; box-shadow: 0 15px 40px rgba(255, 159, 252, 0.3), inset 0 0 20px rgba(255, 159, 252, 0.2); transform: translateY(-5px) scale(1.02); }
        .enter-btn:hover::before { left: 100%; }
        .enter-btn:active { transform: translateY(0) scale(0.98); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* App 内容区初始隐藏及转场 */
        .app-wrapper {
            opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(12px);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), filter 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        .app-wrapper.ready { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); pointer-events: auto; }

        /* ================= Liquid Ether 原生流体背景 ================= */
        .liquid-ether-bg {
            position: fixed; inset: 0; z-index: -1;
            overflow: hidden; pointer-events: none;
            filter: blur(30px); background: #05050A;
            transform-origin: center center;
            will-change: transform;
        }
        .ether-blob {
            position: absolute; border-radius: 50%; opacity: 0.15; 
            will-change: transform; mix-blend-mode: screen;
            animation: ether-float 15s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blob-1 { background: #5227FF; width: 25vw; height: 25vw; top: -5%; left: -5%; }
        .blob-2 { background: #FF9FFC; width: 20vw; height: 20vw; bottom: -5%; right: -5%; animation-delay: -3s; animation-duration: 18s; }
        .blob-3 { background: #B19EEF; width: 22vw; height: 22vw; top: 40%; left: 30%; animation-delay: -7s; animation-duration: 20s; opacity: 0.1; }
        
        .blob-cursor {
            background: radial-gradient(circle, #FF9FFC, #5227FF); 
            width: 120px; height: 120px; 
            top: 0; left: 0; transform: translate3d(-50%, -50%, 0);
            animation: none; opacity: 0.6; border-radius: 50%;
            position: absolute; will-change: transform;
        }
        
        @keyframes ether-float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(5%, 8%) scale(1.1) rotate(5deg); }
            66% { transform: translate(-5%, 5%) scale(0.9) rotate(-5deg); }
            100% { transform: translate(8%, -5%) scale(1.05) rotate(0deg); }
        }

        a { color: var(--primary-color); text-decoration: none; transition: color var(--transition-fast); }
        a:hover { color: #A5B4FC; text-decoration: underline; text-underline-offset: 4px; }
        code { font-family: var(--font-mono); background-color: var(--primary-light); color: #A5B4FC; padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.85em; }

        .container { max-width: 900px; margin: 0 auto; padding-left: 1.5rem; padding-right: 1.5rem; position: relative; z-index: 1; }

        /* 毛玻璃导航栏 */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; height: 64px; 
            background-color: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border-bottom: var(--glass-border); z-index: 1000;
        }
        .navbar .container { display: flex; align-items: center; justify-content: space-between; height: 100%; }
        .nav-brand { font-size: 1.25rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; letter-spacing: -0.02em; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-link { color: var(--text-secondary); font-weight: 500; font-size: 0.9rem; cursor: pointer; }
        .nav-link:hover { color: var(--text-main); text-decoration: none;}
        .icon-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0.5rem; border-radius: var(--radius-md); display: flex; align-items: center; transition: all var(--transition-fast); }
        .icon-btn:hover { background-color: var(--primary-light); color: var(--text-main); transform: scale(1.1); }

        main.container { padding-top: 120px; padding-bottom: 4rem; }

        .reveal-on-scroll { opacity: 0; transform: translateY(30px); transition: opacity 0.8s var(--spring-easing), transform 0.8s var(--spring-easing); will-change: opacity, transform; }
        .reveal-on-scroll.revealed { opacity: 1; transform: translateY(0); }

        /* 基础底层玻璃卡片 */
        .glass-card {
            background-color: var(--surface-color);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-inset), var(--glass-shadow);
        }

        /* 优化4：高层交互弹窗景深映射 */
        .glass-modal {
            background-color: var(--surface-modal);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: var(--glass-border-heavy);
            box-shadow: var(--glass-shadow-heavy), var(--glass-inset);
            border-radius: var(--radius-lg);
        }

        /* Hero区 */
        .hero { text-align: left; margin-bottom: 4rem; padding: 3rem 0 1rem; position: relative; }
        .hero-meta { display: flex; align-items: center; gap: 1rem; font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.05em; margin-bottom: 1.5rem; color: var(--text-secondary); text-transform: uppercase; flex-wrap: wrap; }
        .hero-meta .tag-dark { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: #fff; padding: 0.3rem 0.6rem; display: flex; align-items: center; gap: 0.5rem; font-weight: 700; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); }
        .hero-meta .tag-dark .dot-green { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        .hero-version { font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.4em; color: var(--text-muted); margin-bottom: 2.5rem; text-transform: uppercase; }
        
        .hero-main { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 2rem; position: relative; }
        .hero-title-group { display: flex; flex-direction: column; position: relative; z-index: 2; }
        
        /* 优化1：瀑布流字体层级 & 背景英文大底纹 */
        .hero-name { font-size: 6.5rem; font-weight: 900; line-height: 1; letter-spacing: -0.04em; color: var(--text-main); display: flex; align-items: baseline; margin-left: -0.04em; text-shadow: 0 4px 20px rgba(0,0,0,0.5); position: relative; }
        .hero-name .dot-orange { color: #f97316; font-size: 7rem; line-height: 0.1; margin-left: 0.05em; text-shadow: 0 0 30px rgba(249, 115, 22, 0.6);}
        .hero-bg-text {
            position: absolute; top: 60%; left: -2%; transform: translateY(-50%);
            font-size: 7rem; font-weight: 900; white-space: nowrap; z-index: -1;
            color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.06);
            pointer-events: none; user-select: none; font-family: 'Arial Black', Impact, sans-serif;
            letter-spacing: 0.05em;
        }

        .hero-slogan-img { font-size: 2.2rem; font-weight: 800; color: var(--text-secondary); letter-spacing: -0.02em; margin-top: 1.5rem; }
        
        .hero-avatar { width: 140px; height: 140px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 12px 35px rgba(0,0,0,0.3); object-fit: cover; flex-shrink: 0; background: var(--primary-light); backdrop-filter: blur(10px); position: relative; z-index: 2; }
        
        .hero-intro-text { font-size: 1.15rem; color: #cbd5e1; max-width: 750px; line-height: 1.8; margin-bottom: 2.5rem; position: relative; z-index: 2; }
        .hero-intro-text strong { color: #fff; font-weight: 700; background: rgba(255,255,255,0.1); padding: 0 4px; border-radius: 4px; }
        
        .hero-contact { display: flex; justify-content: flex-start; gap: 1rem; flex-wrap: wrap; }
        .contact-pill {
            display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem;
            background: rgba(255,255,255,0.05); border: var(--glass-border); backdrop-filter: blur(10px);
            border-radius: 99px; font-size: 0.9rem; color: #fff; font-family: var(--font-mono);
            box-shadow: var(--glass-shadow); transition: all 0.3s var(--spring-easing); cursor: pointer;
        }
        .contact-pill:hover { background: rgba(255,255,255,0.15); transform: translateY(-4px); border-color: rgba(255,255,255,0.3); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* 优化5：打破网格的身份卡片 */
        .identities-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 3rem; margin-bottom: 4rem; }
        .identity-card { padding: 3.5rem 1.5rem 2rem; text-align: center; transition: all var(--transition-normal); position: relative; cursor: pointer; overflow: visible; }
        .identity-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, transparent, #FF9FFC, transparent); opacity: 0; transition: opacity 0.3s; border-top-left-radius: var(--radius-lg); border-top-right-radius: var(--radius-lg); }
        .identity-card:hover { transform: translateY(-8px); background-color: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .identity-card:hover::before { opacity: 1; }
        
        .identity-icon-wrapper { 
            position: absolute; top: -2.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.8); border: var(--glass-border-heavy);
            border-radius: 50%; padding: 1.2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(12px); z-index: 2; display: flex; align-items: center; justify-content: center;
        }
        .identity-icon { font-size: 2.5rem; transition: transform 0.4s var(--spring-easing); filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); line-height: 1; }
        .identity-card:hover .identity-icon { transform: scale(1.25) rotate(-5deg); }
        
        .identity-preview-tooltip {
            position: absolute; bottom: calc(100% + 15px); left: 50%; transform: translateX(-50%) translateY(10px) scale(0.95);
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.85rem; opacity: 0; visibility: hidden; 
            transition: all 0.3s var(--spring-easing); width: max-content; max-width: 220px; white-space: normal; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); pointer-events: none; z-index: 20; line-height: 1.4;
        }
        .identity-preview-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border-width: 6px; border-style: solid; border-color: rgba(0,0,0,0.9) transparent transparent transparent; }
        .identity-icon-wrapper:hover .identity-preview-tooltip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0) scale(1); }

        .identity-card h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff; }
        .identity-card p { font-size: 0.95rem; color: #cbd5e1; line-height: 1.5; }
        .click-hint { margin-top: 1.5rem; font-size: 0.85rem; color: #FF9FFC; font-weight: 700; opacity: 0; transform: translateY(10px); transition: all 0.3s var(--spring-easing); font-family: var(--font-mono);}
        .identity-card:hover .click-hint { opacity: 1; transform: translateY(0); }

        /* 标题统一样式 */
        .section-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 2rem; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.8rem; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        .section-title::before { content: ''; display: block; width: 6px; height: 24px; background: linear-gradient(to bottom, #FF9FFC, #5227FF); border-radius: 4px; box-shadow: 0 0 10px #5227FF;}

        /* 优化2：释放卡片的“内呼吸感” */
        .section-card { padding: 2.5rem 3rem; margin-bottom: 2rem; transition: all var(--transition-normal); }
        .section-card:hover { background-color: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.3); transform: translateY(-3px);}
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .card-title-group h3 { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 0.3rem; }
        .card-title-group h4 { font-size: 1rem; font-weight: 500; color: #B19EEF; }
        .card-meta { text-align: right; font-size: 0.9rem; color: #94a3b8; display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; }
        
        .card-body ul { list-style-type: none; padding-left: 0; }
        .card-body li { position: relative; padding-left: 1.5rem; margin-bottom: 0.8rem; color: #cbd5e1; font-size: 1rem; line-height: 1.7; }
        .card-body li::before { content: '—'; position: absolute; left: 0; color: #B19EEF; font-weight: bold; }
        .card-body strong { color: #fff; font-weight: 600; }

        /* 优化5：打破网格的作品集 */
        .portfolio-section { margin-bottom: 5rem; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; padding-top: 1rem;}
        .portfolio-card { overflow: visible; cursor: pointer; transition: all var(--transition-normal); display: flex; flex-direction: column; position: relative;}
        .portfolio-card:hover { background-color: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); }
        .portfolio-thumb { margin: -1.5rem -1.5rem 1rem -1.5rem; height: 160px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 4rem; position: relative; overflow: hidden; color: rgba(255,255,255,0.9); box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.5s var(--spring-easing), box-shadow 0.5s var(--spring-easing); z-index: 2;}
        .portfolio-thumb::after { content: '▶ 实时体验'; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em; opacity: 0; transition: opacity 0.3s ease; }
        .portfolio-card:hover .portfolio-thumb { transform: scale(1.06) translateY(-15px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 3;}
        .portfolio-card:hover .portfolio-thumb::after { opacity: 1; }
        
        .portfolio-info { padding: 0.5rem 0 0 0; flex: 1; display: flex; flex-direction: column;}
        .portfolio-info h3 { font-size: 1.15rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
        .portfolio-info p { font-size: 0.9rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 1.5rem; flex: 1; }
        
        .badges { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: auto; }
        /* 优化8：标签流光扫过特效 */
        .badge { background-color: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 0.3rem 0.8rem; border-radius: 8px; font-size: 0.8rem; font-family: var(--font-mono); backdrop-filter: blur(5px); position: relative; overflow: hidden; }
        .badge::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent); transform: skewX(-20deg); transition: 0s; }
        .portfolio-card:hover .badge::after { left: 200%; transition: left 0.8s ease-in-out; }

        /* Tabs */
        .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); gap: 3rem; margin-bottom: 2rem; overflow-x: auto; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: none; border: none; padding: 0.5rem 0 1rem 0; font-size: 1.15rem; font-weight: 600; color: #94a3b8; cursor: pointer; position: relative; transition: color var(--transition-fast); white-space: nowrap; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .tab-btn:hover { color: #fff; }
        .tab-btn[aria-selected="true"] { color: #FF9FFC; }
        .tab-btn[aria-selected="true"]::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; border-radius: 3px 3px 0 0; background-color: #FF9FFC; box-shadow: 0 0 12px #FF9FFC;}
        .tab-content { display: none; animation: fadeIn 0.5s var(--spring-easing); }
        .tab-content.active { display: block; }

        /* 技能矩阵 */
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2.5rem; }
        .skill-group h4 { font-size: 1.05rem; margin-bottom: 1.5rem; color: #fff; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;}
        .progress-bar { margin-bottom: 1.2rem; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 0.4rem; color: #e2e8f0; font-weight: 600;}
        .progress-num { color: #FF9FFC; }
        .progress-track { height: 8px; background-color: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative;}

        // 渲染核心

                    <h2 class="section-title">可交互作品展示</h2>
                    <div class="portfolio-grid">
            `;

                html += `
                    <div class="portfolio-card glass-card" onclick="openDemo('${item.url}', '${item.name}')">

                        <div class="portfolio-info">

                        <button class="tab-btn" role="tab" aria-selected="true" aria-controls="tab-exp">实习与自媒体</button>

                        <div class="card-header">

                    <div class="section-card glass-card"><div class="skills-grid">
            `;
            resumeData.skills.forEach(skill => {
                html += `
                    <div class="progress-bar">

        // ================= 工具函数 =================
        function parseMarkdown(text) {
            // 将数字替换为等宽字体样式 (仅匹配独立数字或带%的)
            let parsed = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            parsed = parsed.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            parsed = parsed.replace(/`(.*?)`/g, '<code>$1</code>');
            parsed = parsed.replace(/([0-9]+[Ww\+%]*)/g, '<span class="font-mono" style="color:#FF9FFC;">$1</span>');
            return parsed;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function copyText(text, successMsg) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast(successMsg));
            } else {
                let ta = document.createElement("textarea"); ta.value = text; 
                document.body.appendChild(ta); ta.select();
                try { document.execCommand('copy'); showToast(successMsg); } catch(e){}
                document.body.removeChild(ta);
            }
        }

        function initTabs() {
            const tabs = document.querySelectorAll('[role="tab"]');
            const panels = document.querySelectorAll('[role="tabpanel"]');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
                    panels.forEach(p => p.classList.remove('active'));
                    tab.setAttribute('aria-selected', 'true');
                    document.getElementById(tab.getAttribute('aria-controls')).classList.add('active');
                    setTimeout(() => ScrollReveal.checkVisibility(), 50);
                });
            });
        }

        function openIdentity(index) {
            const data = resumeData.identities[index];
            document.getElementById('identityModalTitle').innerHTML = `${data.icon} ${data.title}`;
            document.getElementById('identityModalIcon').innerHTML = data.icon;
            document.getElementById('identityModalContent').innerHTML = `<h4>关于我的 ${data.title} 经历：</h4>${data.details}`;
            
            document.getElementById('identityModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeIdentity() {
            document.getElementById('identityModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function openDemo(url, title) {
            if(url === 'index.html' && window.location.pathname.endsWith('index.html')) url = 'plane_war.html'; 
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('demoModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            setTimeout(() => { document.getElementById('demoIframe').src = url; }, 100);
        }
        function closeDemo() {
            document.getElementById('demoModal').classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => { document.getElementById('demoIframe').src = ''; }, 300);
        }

        // ================= 滚动与动画 =================
        const ScrollReveal = {
            observer: new IntersectionObserver(entries => {
                entries.forEach(e => {
                    if(e.isIntersecting) {
                        e.target.classList.add('revealed');
                        if(e.target.querySelector('.progress-fill')) animateSkills();
                        ScrollReveal.observer.unobserve(e.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }),
            checkVisibility() { document.querySelectorAll('.reveal-on-scroll:not(.revealed)').forEach(el => this.observer.observe(el)); }
        };

        let hasAnim = false;
        function animateSkills() {
            if(hasAnim) return; hasAnim = true;
            setTimeout(() => {
                document.querySelectorAll('.progress-fill').forEach(el => el.style.width = el.getAttribute('data-width'));
                document.querySelectorAll('.progress-num').forEach(el => {
                    let t = parseInt(el.getAttribute('data-target')), c = 0, step = t/30;
                    let iv = setInterval(() => {
                        c += step;
                        if(c >= t) { el.textContent = t + '%'; clearInterval(iv); } 
                        else el.textContent = Math.floor(c) + '%';
                    }, 33);
                });
            }, 100);
        }

        // ================= AI助手与导出 =================
        const aiWin = document.getElementById('aiChatWindow');
        const chatInput = document.getElementById('chatInput');
        const chatMsgs = document.getElementById('chatMessages');
        let chatHistory = [];
        
        function toggleChat() { aiWin.classList.toggle('active'); if(aiWin.classList.contains('active')) chatInput.focus(); }
        document.getElementById('aiChatToggle').addEventListener('click', toggleChat);

        function addMsg(text, isUser) {
            const d = document.createElement('div'); d.className = `chat-msg ${isUser?'user':'model'}`;
            if(text === 'typing') d.id = 'typing';
            d.innerHTML = text === 'typing' 
                ? `<div class="chat-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>` 
                : `<div class="chat-bubble">${text}</div>`;
            chatMsgs.appendChild(d); chatMsgs.scrollTop = chatMsgs.scrollHeight;
        }

        async function handleSend() {
            const text = chatInput.value.trim(); if(!text) return;
            addMsg(text, true); chatInput.value = ''; addMsg('typing', false);
            
            // 模拟API调用/实际接入
            const responseText = "您好，受环境网络限制，我是离线分身。翟士源是一位精通软硬件结合与AI工具操盘的复合型人才，建议直接通过邮件联系他本人。";
            setTimeout(() => {
                const typ = document.getElementById('typing'); if(typ) typ.remove();
                chatHistory.push({role:'user', text}, {role:'model', text:responseText});
                addMsg(responseText, false);
            }, 800);
        }
        document.getElementById('chatSendBtn').addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', e => { if(e.key === 'Enter') handleSend(); });

        function exportChatToEmail() {
            if(!chatHistory.length) return showToast("当前无记录");
            let str = "沟通记录：\n\n";
            chatHistory.forEach(m => str += `【${m.role==='user'?'面试官':'AI'}】:\n${m.text}\n\n`);
            document.getElementById('chatHistoryText').value = str;
            aiWin.classList.remove('active');
            document.getElementById('chatHistoryModal').classList.add('active');
        }
        function closeChatHistory() { document.getElementById('chatHistoryModal').classList.remove('active'); }
        function sendMailtoWithClipboard() {
            copyText(document.getElementById('chatHistoryText').value, "已复制！正在拉起邮箱...");
            const a = document.createElement('a');
            a.href = `mailto:${resumeData.basics.email}?subject=面试沟通记录&body=记录已复制在剪贴板，请直接粘贴`;
            a.target = '_blank'; document.body.appendChild(a); a.click(); a.remove();
        }

        function injectSchema() {
            const schema = {
                "@context": "https://schema.org",
                "@type": "Person",
                "name": resumeData.basics.name,
                "jobTitle": "软件工程师 / AI 应用开发者",
                "telephone": resumeData.basics.phone,
                "email": resumeData.basics.email,
                "description": resumeData.basics.intro,
            };
            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.text = JSON.stringify(schema);
            document.head.appendChild(script);
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('currentYear').textContent = new Date().getFullYear();
            renderResume();
            injectSchema();
        });
    </script>
